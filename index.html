<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alisson Lemos · Nutricionista</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EBEBEB;
    --dark: #1A1A1A;
    --mid: #4A4A4A;
    --accent: #2D5C3F;
    --accent2: #B5935A;
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }
  .avatar-wrap {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.8);
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }
  .photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
  }
  .crn {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.24em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2rem;
    font-weight: 500;
    color: var(--dark);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .divider {
    width: 32px;
    height: 1px;
    background: var(--accent2);
    opacity: 0.5;
    margin: 22px 0;
  }
  .tagline {
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--mid);
    line-height: 1.75;
    max-width: 360px;
    margin-bottom: 36px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 18px 44px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(45,92,63,0.15);
    transition: transform 0.2s ease, background-color 0.2s ease;
  }
  .btn:active { transform: scale(0.97); }
  @media (hover: hover) {
    .btn:hover { background: #20452f; transform: translateY(-2px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
